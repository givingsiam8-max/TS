<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechBD – Future Technology Studio</title>

    <!-- Font -->
    <link href="https://cdn.jsdelivr.net/npm/fontsource-inter@5.1.0/index.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader-ring"></div>
        <div class="loader-text">TECHBD</div>
    </div>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <a href="#" class="logo">TechBD</a>
        <ul class="nav-links" id="navLinks">
            <li><a href="#home">Home</a></li>
            <li><a href="#products">Products</a></li>
            <li><a href="#studio">Studio</a></li>
            <li><a href="#features">Features</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
        <div class="nav-toggle" id="navToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <canvas class="hero-canvas" id="heroCanvas"></canvas>
        <div class="hero-content">
            <h1>Welcome to TechBD</h1>
        </div>
    </section>

    <!-- Contact Form -->
    <section id="contact">
        <form id="contactForm">
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Message"></textarea>
            <button class="submit-btn">Send</button>
        </form>
    </section>

    <!-- Theme Toggle -->
    <div class="theme-toggle" id="themeToggle"></div>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
